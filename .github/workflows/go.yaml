# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'cmd/**'
      - 'game/**'
      - 'internal/**'
      - 'pkg/**'
      - .github/workflows/go.yaml
      - go.mod
      - '!**.md'

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24.x', '1.25.x', '1.26.x']
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev libxxf86vm-dev libasound2-dev pkg-config xvfb

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}

    - name: Format
      run: |
        OUTPUT="$(go fmt ./...)"
        if [ -n "${OUTPUT}" ]; then
          echo "${OUTPUT}"
          echo "Source files are not formatted correctly.  Run \`go fmt ./...\`"
          exit 1
        fi

    - name: Build
      run: go build -v ./...

    - name: Test
      run: xvfb-run -a go test -v ./...
